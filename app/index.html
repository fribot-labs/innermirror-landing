<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InnerMirror App</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #0f172a;
      color: #fff;
      line-height: 1.6;
    }

    header {
      padding: 22px 7%;
      border-bottom: 1px solid rgba(148,163,184,.18);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { font-size: 22px; font-weight: 900; }
    .status { font-size: 14px; color: #93c5fd; }

    .panel {
      background: rgba(30,41,59,.65);
      border: 1px solid rgba(148,163,184,.2);
      border-radius: 24px;
      padding: 28px;
    }

    main {
      padding: 46px 7%;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 28px;
      align-items: start;
    }

    h1, h2 { margin-top: 0; letter-spacing: -0.8px; }
    h1 { font-size: 32px; }
    h2 { font-size: 22px; }

    p { color: #cbd5e1; }

    label {
      display: block;
      font-weight: 800;
      margin: 18px 0 8px;
    }

    textarea, input {
      width: 100%;
      border: 1px solid rgba(148,163,184,.28);
      background: rgba(15,23,42,.8);
      color: white;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      resize: vertical;
      min-height: 68px;
    }

    input { min-height: auto; }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      background: #3b82f6;
      color: white;
      font-weight: 900;
      cursor: pointer;
    }

    button:hover { opacity: 0.92; }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 22px;
    }

    .secondary {
      background: transparent;
      border: 1px solid rgba(148,163,184,.35);
      color: #dbeafe;
    }

    .record {
      background: rgba(15,23,42,.75);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .record strong {
      display: block;
      color: #93c5fd;
      margin-bottom: 8px;
    }

    .record p { margin: 6px 0; }

    .badge {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(59,130,246,.16);
      color: #93c5fd;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .diff {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(2,6,23,.45);
      border: 1px solid rgba(148,163,184,.18);
    }

    .diff h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .changed {
      color: #fbbf24;
      font-weight: 800;
    }

    .same {
      color: #94a3b8;
    }

    .timeline {
      display: grid;
      gap: 12px;
      margin-bottom: 22px;
    }

    .timeline-item {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(15,23,42,.68);
      border-left: 4px solid #3b82f6;
    }

    .timeline-item span {
      display: block;
      color: #94a3b8;
      font-size: 13px;
    }

    .empty {
      color: #94a3b8;
      padding: 22px;
      border: 1px dashed rgba(148,163,184,.35);
      border-radius: 18px;
      text-align: center;
    }

    .auth-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .auth-actions button {
      width: 100%;
    }

    .locked {
      opacity: 0.45;
      pointer-events: none;
    }

    .login-required-message {
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(96, 165, 250, 0.25);
      color: #bfdbfe;
      font-size: 14px;
    }

    footer {
      padding: 24px 7%;
      color: #64748b;
      font-size: 13px;
    }

    #logoutButton {
      display: none;
    }

    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .button-row { grid-template-columns: 1fr; }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <header>
    <div class="logo">InnerMirror</div>
    <div class="status">Supabase Auth · Decision Evolution</div>
  </header>

  <section class="panel" style="margin: 28px 7% 0;">
    <h2>로그인</h2>
    <p>Google 계정으로 바로 시작하거나 이메일 링크로 로그인할 수 있습니다.</p>

    <input id="email" placeholder="your@email.com" />

    <div class="auth-actions">
      <button id="googleLoginButton" onclick="signInWithGoogle()">
        Google로 시작하기
      </button>

      <button id="emailLoginButton" class="secondary" onclick="signIn()">
        이메일 로그인 링크 받기
      </button>

      <button id="logoutButton" class="secondary" onclick="signOut()">
        로그아웃하기
      </button>
    </div>

    <p id="authStatus" style="color:#93c5fd;font-size:14px;margin-top:14px;">
      로그인 상태 확인 중...
    </p>
  </section>

  <main>
    <section id="editorPanel" class="panel">
      <h1>판단 버전 기록</h1>

      <div id="loginRequiredMessage" class="login-required-message">
        먼저 로그인하면 판단 기록을 저장할 수 있습니다.
      </div>

      <p>
        같은 문제를 여러 번 수정하며 기록하세요.
        InnerMirror는 이전 버전과 비교해 판단 변화 신호를 보여줍니다.
      </p>

      <p style="color:#93c5fd;font-size:14px;">
        이전 판단을 수정하면서 다음 버전을 만들어보세요.
      </p>

      <label>문제 정의</label>
      <textarea id="problem" placeholder="예: 로봇이 직진하지 않고 왼쪽으로 치우친다."></textarea>

      <label>접근 방식</label>
      <textarea id="approach" placeholder="예: 좌우 모터 속도 차이를 offset 값으로 보정한다."></textarea>

      <label>판단 이유</label>
      <textarea id="reason" placeholder="예: 같은 명령값에서도 모터 특성이 달라 실제 회전 속도가 다르기 때문이다."></textarea>

      <label>다음 실행</label>
      <input id="nextAction" placeholder="예: offset 값을 3단계로 테스트한다." />

      <div class="button-row">
        <button onclick="saveRecord()">새 버전 저장하기</button>
        <button class="secondary" onclick="loadLast()">이전 버전 불러오기</button>
      </div>
    </section>

    <section class="panel">
      <h2>판단 진화 히스토리</h2>
      <div id="timeline"></div>

      <h2>버전 기록</h2>
      <div id="history"></div>
    </section>
  </main>

  <footer>
    © 2026 InnerMirror · Fribot Labs
  </footer>

  <script>
    const SUPABASE_URL = "https://igkrmqdnlyanoyxbtsxr.supabase.co";

    /*
      아래 값은 Supabase Dashboard → Project Settings → API 에서 복사한
      publishable key 또는 anon public key를 넣으세요.
    */
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlna3JtcWRubHlhbm95eGJ0c3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzOTYxNDAsImV4cCI6MjA4Njk3MjE0MH0.whw6j0VkZp7Z8m_MuJCKe4ccTjrFeuMoahYmGTg-8_w";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let isRendering = false;

    async function initAuth() {
      try {
        const { data, error } = await supabaseClient.auth.getSession();

        if (error) {
          console.error("getSession error:", error);
        }

        currentUser = data.session?.user ?? null;
        updateAuthStatus();

        supabaseClient.auth.onAuthStateChange((_event, session) => {
          currentUser = session?.user ?? null;
          updateAuthStatus();
          render();
        });

        await render();
      } catch (error) {
        console.error("initAuth error:", error);
        alert("로그인 상태를 확인하는 중 오류가 발생했습니다.");
      }
    }

    function updateAuthStatus() {
      const statusEl = document.getElementById("authStatus");
      const emailInput = document.getElementById("email");
      const googleLoginButton = document.getElementById("googleLoginButton");
      const emailLoginButton = document.getElementById("emailLoginButton");
      const logoutButton = document.getElementById("logoutButton");
      const editorPanel = document.getElementById("editorPanel");
      const loginRequiredMessage = document.getElementById("loginRequiredMessage");

      if (currentUser) {
        statusEl.textContent = `현재 로그인됨: ${currentUser.email}`;

        emailInput.style.display = "none";
        googleLoginButton.style.display = "none";
        emailLoginButton.style.display = "none";
        logoutButton.style.display = "block";

        editorPanel.classList.remove("locked");
        loginRequiredMessage.style.display = "none";
      } else {
        statusEl.textContent = "로그인되지 않았습니다.";

        emailInput.style.display = "block";
        googleLoginButton.style.display = "block";
        emailLoginButton.style.display = "block";
        logoutButton.style.display = "none";

        editorPanel.classList.add("locked");
        loginRequiredMessage.style.display = "block";
      }
    }

    async function signIn() {
      const email = document.getElementById("email").value.trim();

      if (!email) {
        alert("이메일을 입력해주세요.");
        return;
      }

      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: "https://innermirror.net/app/"
        }
      });

      if (error) {
        console.error("signIn error:", error);
        alert(error.message);
        return;
      }

      alert("로그인 링크를 이메일로 보냈습니다.");
    }

    async function signInWithGoogle() {
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: "https://innermirror.net/app/"
        }
      });

      if (error) {
        console.error("Google signIn error:", error);
        alert(error.message);
      }
    }

    async function signOut() {
      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        console.error("signOut error:", error);
        alert(error.message);
        return;
      }

      currentUser = null;
      updateAuthStatus();
      await render();
    }

    async function getLogs() {
      if (!currentUser) return [];

      const { data, error } = await supabaseClient
        .from("decision_versions")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("version", { ascending: false });

      if (error) {
        console.error("getLogs error:", error);
        alert("기록을 불러오는 중 오류가 발생했습니다.");
        return [];
      }

      return data.map(row => ({
        id: row.id,
        version: row.version,
        createdAt: new Date(row.created_at).toLocaleString("ko-KR"),
        problem: row.problem,
        approach: row.approach,
        reason: row.reason,
        nextAction: row.next_action || "",
        changes: row.changes || []
      }));
    }

    async function saveRecord() {
      if (!currentUser) {
        alert("먼저 로그인해주세요.");
        return;
      }

      const problem = document.getElementById("problem").value.trim();
      const approach = document.getElementById("approach").value.trim();
      const reason = document.getElementById("reason").value.trim();
      const nextAction = document.getElementById("nextAction").value.trim();

      if (!problem || !approach || !reason) {
        alert("문제 정의, 접근 방식, 판단 이유를 입력해주세요.");
        return;
      }

      const logs = await getLogs();
      const previous = logs[0] || null;

      const nextVersion = logs.length + 1;
      const changes = previous
        ? detectChanges(previous, { problem, approach, reason, nextAction })
        : [];

      const { error } = await supabaseClient
        .from("decision_versions")
        .insert({
          user_id: currentUser.id,
          version: nextVersion,
          problem,
          approach,
          reason,
          next_action: nextAction,
          changes
        });

      if (error) {
        console.error("saveRecord error:", error);
        alert("저장 중 오류가 발생했습니다.");
        return;
      }

      clearForm();
      await render();
    }

    async function loadLast() {
      if (!currentUser) {
        alert("먼저 로그인해주세요.");
        return;
      }

      const logs = await getLogs();

      if (logs.length === 0) {
        alert("불러올 이전 버전이 없습니다.");
        return;
      }

      const last = logs[0];

      document.getElementById("problem").value = last.problem;
      document.getElementById("approach").value = last.approach;
      document.getElementById("reason").value = last.reason;
      document.getElementById("nextAction").value = last.nextAction || "";
    }

    function detectChanges(prev, next) {
      const fields = [
        ["problem", "문제 정의"],
        ["approach", "접근 방식"],
        ["reason", "판단 이유"],
        ["nextAction", "다음 실행"]
      ];

      return fields
        .filter(([key]) => (prev[key] || "") !== (next[key] || ""))
        .map(([key, label]) => ({
          key,
          label,
          before: prev[key] || "",
          after: next[key] || ""
        }));
    }

    function clearForm() {
      document.getElementById("problem").value = "";
      document.getElementById("approach").value = "";
      document.getElementById("reason").value = "";
      document.getElementById("nextAction").value = "";
    }

    async function render() {
      if (isRendering) return;
      isRendering = true;

      try {
        const logs = await getLogs();
        renderTimeline(logs);
        renderHistory(logs);
      } catch (error) {
        console.error("render error:", error);
      } finally {
        isRendering = false;
      }
    }

    function renderTimeline(logsInput) {
      const timeline = document.getElementById("timeline");

      if (!currentUser) {
        timeline.innerHTML = "";
        return;
      }

      const logs = logsInput.slice().reverse();

      if (logs.length === 0) {
        timeline.innerHTML = "";
        return;
      }

      timeline.innerHTML = `
        <div class="timeline">
          ${logs.map(log => `
            <div class="timeline-item">
              <b>V${log.version}</b> · ${changeSummary(log)}
              <span>${escapeHtml(log.createdAt)}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderHistory(logs) {
      const history = document.getElementById("history");

      if (!currentUser) {
        history.innerHTML = `
          <div class="empty">
            로그인하면 판단 기록을 저장하고 불러올 수 있습니다.
          </div>
        `;
        return;
      }

      if (logs.length === 0) {
        history.innerHTML = `
          <div class="empty">
            아직 기록이 없습니다.<br />
            첫 번째 판단 버전을 저장해보세요.
          </div>
        `;
        return;
      }

      history.innerHTML = logs.map(log => `
        <div class="record">
          <span class="badge">V${log.version}</span>
          <strong>${escapeHtml(log.createdAt)}</strong>

          <p><b>문제:</b> ${escapeHtml(log.problem)}</p>
          <p><b>접근:</b> ${escapeHtml(log.approach)}</p>
          <p><b>판단 이유:</b> ${escapeHtml(log.reason)}</p>
          ${log.nextAction ? `<p><b>다음 실행:</b> ${escapeHtml(log.nextAction)}</p>` : ""}

          ${renderDiff(log)}
        </div>
      `).join("");
    }

    function renderDiff(log) {
      if (log.version === 1) {
        return `
          <div class="diff">
            <h3>변화 신호</h3>
            <p class="same">첫 번째 버전입니다.</p>
          </div>
        `;
      }

      if (!log.changes || log.changes.length === 0) {
        return `
          <div class="diff">
            <h3>변화 신호</h3>
            <p class="same">이전과 동일한 판단입니다.</p>
          </div>
        `;
      }

      return `
        <div class="diff">
          <h3>판단 변화 비교</h3>
          ${log.changes.map(change => `
            <div style="margin-bottom:12px;">
              <b class="changed">${escapeHtml(change.label)}</b>
              <div style="font-size:13px;color:#94a3b8;margin-top:4px;">
                이전: ${escapeHtml(change.before)}
              </div>
              <div style="font-size:13px;color:#93c5fd;">
                현재: ${escapeHtml(change.after)}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function changeSummary(log) {
      if (log.version === 1) return "초기 판단 생성";

      if (!log.changes || log.changes.length === 0) {
        return "판단 유지";
      }

      if (log.changes.length === 1) {
        return `${log.changes[0].label} 수정`;
      }

      return `${log.changes.length}개 요소 변화`;
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    initAuth();
  </script>
</body>
</html>
